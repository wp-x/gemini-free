name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: ./build.sh

      - name: Zip app
        run: ditto -c -k --keepParent "Gemini Free.app" GeminiFree-macOS.zip

      - uses: actions/upload-artifact@v4
        with:
          name: GeminiFree-macOS
          path: GeminiFree-macOS.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GeminiFree-macOS.zip
